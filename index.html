<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vacation Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="vacay.css">
</head>
<body>

  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <!-- Top nav bar -->
  <nav class="navbar">
    <span class="nav-logo">Vacation Planner</span>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <button class="nav-btn" id="nav-auth-btn" onclick="openAuthModal('login')">Sign in</button>
    </div>
  </nav>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="auth-modal">
    <div class="modal">
      <button class="modal-close" onclick="closeAuthModal()">&#x2715;</button>

      <div class="modal-tabs">
        <button class="modal-tab active" id="tab-login" onclick="switchTab('login')">Sign in</button>
        <button class="modal-tab" id="tab-signup" onclick="switchTab('signup')">Create account</button>
      </div>

      <div id="auth-error" class="auth-error"></div>

      <div id="login-form">
        <div class="modal-field">
          <label class="field-label">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com">
        </div>
        <div class="modal-field">
          <label class="field-label">Password</label>
          <input type="password" id="login-password" placeholder="Your password">
        </div>
        <button class="plan-btn full-width" onclick="handleLogin()">Sign in</button>
      </div>

      <div id="signup-form" style="display:none;">
        <div class="modal-field">
          <label class="field-label">Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com">
        </div>
        <div class="modal-field">
          <label class="field-label">Password</label>
          <input type="password" id="signup-password" placeholder="At least 6 characters">
        </div>
        <button class="plan-btn full-width" onclick="handleSignup()">Create account</button>
      </div>

    </div>
  </div>

  <div class="container">
    <p class="eyebrow">Your next adventure</p>
    <h1>Vacation<br><em>Planner</em></h1>
    <p class="subtitle">Tell us where you're headed, your budget, and when you're going — and we'll craft your perfect itinerary.</p>

    <div class="form">

      <div class="field">
        <label class="field-label" for="location">Destination</label>
        <input type="text" id="location" placeholder="City, country, or region…">
      </div>

      <div class="field">
        <label class="field-label" for="budget">Budget (USD)</label>
        <input type="number" id="budget" placeholder="Enter your total budget…">
      </div>

      <div class="field">
        <label class="field-label">Travel dates</label>
        <div class="date-input-row" id="date-trigger">
          <svg class="cal-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="4" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.2"/>
            <path d="M2 8h16" stroke="currentColor" stroke-width="1.2"/>
            <path d="M6 2v4M14 2v4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span id="date-display">Select dates…</span>
        </div>
      </div>

      <div class="calendar-popup" id="calendar-popup">
        <div class="calendar-header">
          <button class="cal-nav" id="prev-month">&#8249;</button>
          <span class="cal-month-label" id="month-label"></span>
          <button class="cal-nav" id="next-month">&#8250;</button>
        </div>
        <div class="calendar-grid">
          <div class="cal-day-name">Su</div>
          <div class="cal-day-name">Mo</div>
          <div class="cal-day-name">Tu</div>
          <div class="cal-day-name">We</div>
          <div class="cal-day-name">Th</div>
          <div class="cal-day-name">Fr</div>
          <div class="cal-day-name">Sa</div>
        </div>
        <div class="calendar-days" id="calendar-days"></div>
        <div class="calendar-footer">
          <span id="cal-selection-hint">Select a start date</span>
          <button class="cal-clear" id="cal-clear">Clear</button>
        </div>
      </div>

      <button class="plan-btn" onclick="planVacation()">
        Plan my trip
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 10h12M11 5l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

    </div>

    <div id="result"></div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script src="vacation.js"></script>
</body>
</html>
