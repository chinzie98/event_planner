<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Trips — Vacation Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="vacay.css">
  <link rel="stylesheet" href="trips.css">
</head>
<body>

  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <nav class="navbar">
    <a class="nav-logo" href="/">Vacation Planner</a>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <button class="nav-btn nav-upgrade-btn" id="nav-upgrade-btn" style="display:none;">&#9733; Upgrade</button>
      <button class="nav-btn" id="nav-auth-btn">Sign in</button>
    </div>
  </nav>

  <div class="container">
    <p class="eyebrow">Your saved adventures</p>
    <h1>My <em>Trips</em></h1>

    <div id="trips-loading" class="trips-loading">Loading your trips…</div>
    <div id="trips-empty" class="trips-empty" style="display:none;">
      <p>No saved trips yet.</p>
      <a href="/" class="plan-btn" style="display:inline-flex; margin-top: 1rem; text-decoration:none;">Plan your first trip</a>
    </div>
    <div id="trips-grid" class="trips-grid" style="display:none;"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script src="trips.js"></script>
</body>
</html>
